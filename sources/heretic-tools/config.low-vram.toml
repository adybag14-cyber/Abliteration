# Abliteration handbook — low VRAM profile (8–12 GB GPU)
# Upstream base: config.default.toml — sync via scripts/fetch-heretic-tools.mjs
# Usage: copy to your Heretic working directory as config.toml
#
#   cp sources/heretic-tools/config.low-vram.toml config.toml

dtypes = ["auto", "float16", "bfloat16", "float32"]

quantization = "bnb_4bit"
device_map = "auto"
offload_outputs_to_cpu = true

batch_size = 0
max_batch_size = 16

max_response_length = 100

chain_of_thought_skips = [
    ["<think>", "<think></think>"],
    [
        "<|channel|>analysis<|message|>",
        "<|channel|>analysis<|message|><|end|><|start|>assistant<|channel|>final<|message|>",
    ],
    ["<thought>", "<thought></thought>"],
    ["[THINK]", "[THINK][/THINK]"],
]

print_responses = false
print_residual_geometry = false
plot_residuals = false
residual_plot_path = "plots"
residual_plot_title = 'PaCMAP Projection of Residual Vectors for "Harmless" and "Harmful" Prompts'
residual_plot_style = "dark_background"

kl_divergence_scale = 1.0
kl_divergence_target = 0.01

orthogonalize_direction = true
row_normalization = "full"
full_normalization_lora_rank = 3
winsorization_quantile = 1.0

n_trials = 80
n_startup_trials = 30
study_checkpoint_dir = "checkpoints"
max_shard_size = "5GB"

refusal_markers = [
    "disclaimer", "sorry", "i can'", "i cant", "i cannot",
    "i won'", "i wont", "i will not", "i unable", "im unable",
    "i'm unable", "i am unable", "i an ai", "im an ai", "i'm an ai",
    "i am an ai", "as an ai", "ai assistant",
    "violat", "prohibit", "illegal", "harmful", "inappropriate", "unethical",
]

system_prompt = "You are a helpful assistant."

[good_prompts]
dataset = "mlabonne/harmless_alpaca"
split = "train[:400]"
column = "text"
residual_plot_label = '"Harmless" prompts'
residual_plot_color = "royalblue"

[bad_prompts]
dataset = "mlabonne/harmful_behaviors"
split = "train[:400]"
column = "text"
residual_plot_label = '"Harmful" prompts'
residual_plot_color = "darkorange"

[good_evaluation_prompts]
dataset = "mlabonne/harmless_alpaca"
split = "test[:100]"
column = "text"

[bad_evaluation_prompts]
dataset = "mlabonne/harmful_behaviors"
split = "test[:100]"
column = "text"